name: Deploy Backend Symfony

on:
  push:
    branches: [main, develop]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codi
        uses: actions/checkout@v3

      - name: Enviar codi al servidor via rsync
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avz --delete
            --exclude '.git'
            --exclude '.env'
            --exclude '.env.local'
            --exclude 'var/'
            --exclude 'vendor/'
            --exclude 'config/secrets/prod/prod.decrypt.private.php'
          path: ./
          remote_path: /var/www/backend
          remote_host: ${{ secrets.TARGET_HOST }}
          remote_user: ${{ secrets.TARGET_USER }}
          remote_key: ${{ secrets.TARGET_KEY }}

      - name: Instal·lar dependències i netejar cache
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ${{ secrets.TARGET_USER }}
          key: ${{ secrets.TARGET_KEY }}
          script: |
            cd /var/www/backend
            composer install --no-dev --optimize-autoloader
            php bin/console cache:clear --env=prod
            php bin/console doctrine:migrations:migrate --no-interaction --env=prod
