security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            stateless: true
            jwt: ~

    access_control:
        - { path: ^/failrun/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/failrun/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/failrun/api/test, roles: PUBLIC_ACCESS }
        - { path: ^/failrun/api, roles: IS_AUTHENTICATED_FULLY }